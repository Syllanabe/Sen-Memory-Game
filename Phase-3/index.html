<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sen Memory Game - Phase 3</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Sen Memory Game</h1>
      <p>Phase 3 : système de score et suivi des performances.</p>
    </header>

    <section class="game-panel">
      <div class="info-bar">
        <div>
          <span class="label">Mouvements</span>
          <strong id="movesCount">0</strong>
        </div>

        <div>
          <span class="label">Score</span>
          <strong id="scoreCount">100</strong>
        </div>

        <div>
          <span class="label">Paires trouvées</span>
          <strong id="matchesCount">0</strong>
        </div>

        <div>
          <span class="label">Feedback</span>
          <strong id="feedbackText">Commencez la partie</strong>
        </div>
      </div>

      <div id="gameBoard" class="game-board"></div>

      <div class="actions">
        <button id="restartBtn">Recommencer</button>
      </div>

      <p id="message" class="message" hidden></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
